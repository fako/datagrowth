name: Docs

on:
    push:
        branches: ["master"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Build docs
              run: |
                  mkdir -p docs/_build
                  invoke docs.build

            - name: Add root redirect to current docs version
              run: |
                  VERSION=$(python -c "from datagrowth.version import VERSION; print(VERSION)")
                  if [ ! -f "docs/_build/html/index.html" ]; then
                    cat <<EOF > docs/_build/html/index.html
                  <!doctype html>
                  <html>
                    <head>
                      <meta charset="utf-8">
                      <meta http-equiv="refresh" content="0; url=./${VERSION}/">
                      <title>Redirecting...</title>
                    </head>
                    <body>
                      <p>Redirecting to docs version ${VERSION}...</p>
                    </body>
                  </html>
                  EOF
                  fi

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: docs/_build/html

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
