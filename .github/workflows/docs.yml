name: Docs

on:
    workflow_dispatch:
        inputs:
            ref:
                description: "Git ref to build docs from (tag, branch, or SHA)"
                required: true
                default: "master"
            version:
                description: "Published docs version (optional override, e.g. 0.20.6)"
                required: false
            is_latest:
                description: "Whether this publish should update latest"
                required: false
                default: "true"

permissions:
    contents: write

concurrency:
    group: docs-publish
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout source
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.ref || github.ref }}

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Build docs
              run: |
                  mkdir -p docs/_build
                  invoke docs.build

            - name: Determine docs version
              id: version
              run: |
                  BUILT_VERSION=$(python -c "from datagrowth.version import VERSION; print(VERSION)")
                  INPUT_VERSION="${{ github.event.inputs.version }}"
                  if [ -n "$INPUT_VERSION" ]; then
                    VERSION="$INPUT_VERSION"
                  elif [ "${{ github.event_name }}" = "push" ]; then
                    VERSION="${GITHUB_REF_NAME#v}"
                  else
                    VERSION="$BUILT_VERSION"
                  fi
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "built_version=$BUILT_VERSION" >> "$GITHUB_OUTPUT"
                  echo "Publishing docs version: $VERSION (built from: $BUILT_VERSION)"

            - name: Checkout gh-pages
              uses: actions/checkout@v4
              with:
                  ref: gh-pages
                  path: gh-pages-existing
              continue-on-error: true

            - name: Prepare gh-pages content
              run: |
                  IS_LATEST="${{ github.event.inputs.is_latest }}"
                  LATEST_FLAG=""
                  if [ -n "$IS_LATEST" ] && [ "$IS_LATEST" = "false" ]; then
                    LATEST_FLAG="--no-is-latest"
                  fi
                  invoke docs.publish --version "${{ steps.version.outputs.version }}" --built-version "${{ steps.version.outputs.built_version }}" --existing-root gh-pages-existing --target-root site ${LATEST_FLAG}

            - name: Deploy to gh-pages branch
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_branch: gh-pages
                  publish_dir: site
                  keep_files: true
