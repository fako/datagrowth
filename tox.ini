[tox]
envlist = py{312,313,314}-django52
skip_missing_interpreters = true

[testenv]
passenv =
    DJANGO_SETTINGS_MODULE
    DJANGO_DEFAULT_DATABASE
    DJANGO_MYSQL_USER
    PYTHONPATH
    HOME
    DISPLAY
deps =
    django52: Django>=5.2,<5.3
    -rrequirements/django.txt
    -e.
commands = invoke test.run {posargs}
